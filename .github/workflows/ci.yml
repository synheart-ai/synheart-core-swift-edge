name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      # No explicit `xcode-select` pin — Xcode_15.4 (the previous pin)
      # lacks the `@retroactive` attribute that synheart-wear-swift uses
      # in BleHrmProvider.swift. macos-latest ships a current Xcode that
      # includes the Swift 5.10+ toolchain, matching the runner config
      # synheart-wear-swift / synheart-session-swift use successfully.
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test
        run: |
          if [ -d "Tests" ]; then
            swift test -v
          else
            echo "No Tests directory found, skipping"
          fi

  lint:
    name: Lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: |
          if [ -f ".swiftlint.yml" ]; then
            swiftlint --strict
          else
            echo "No .swiftlint.yml — skipping"
          fi
