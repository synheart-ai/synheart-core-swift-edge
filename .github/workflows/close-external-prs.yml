name: Close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    if: github.event.pull_request.author_association != 'OWNER' &&
        github.event.pull_request.author_association != 'MEMBER' &&
        github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Close PR with explanation
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Hi @" + context.payload.pull_request.user.login + ", thanks for your interest in Synheart.",
              "",
              "This repository is **source-available** and we do **not accept external pull requests** at this time.",
              "Synheart SDKs are developed in an internal monorepo and mirrored here for transparency.",
              "",
              "If you found a bug or want to request a feature, please [open an issue](../../issues/new/choose) — that is the supported way to influence the SDK.",
              "For the rationale, see [CONTRIBUTING.md](../blob/HEAD/CONTRIBUTING.md). For security reports, see [SECURITY.md](../blob/HEAD/SECURITY.md).",
              "",
              "We are closing this PR automatically. Thanks again for taking the time to look at the code.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
